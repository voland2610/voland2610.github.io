<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
	<link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet" type="text/css" href="dist/css/lightbox.css">
	<title></title>
</head>
<body>
  <div id="wrap">  
    <header>
       <div id="menu">имя</div>
       <div id="menu">телефон</div>
    </header>
  </div>
	<div class="swiper-container">
    <div class="swiper-wrapper">
      <div class="swiper-slide" data-lightbox="test"><img height="800" width="800" src="5.jpg"></div>
      <div class="swiper-slide" data-lightbox="test"><img height="800" width="800" src="2.jpg"></div>
      <div class="swiper-slide" data-lightbox="test"><img height="800" width="800" src="3.jpg"></div>
      <div class="swiper-slide" data-lightbox="test"><img height="800" width="800" src="6.jpg"></div>
      <div class="swiper-slide" data-lightbox="test"><img height="800" width="800" src="4.jpg"></div>
    </div>
  </div>
  <div id="footer">
    <p>
      почта
    </p>
      телефон
</div>
  <script src="dist/js/lightbox-plus-jquery.js"></script>
  <script src="https://unpkg.com/swiper/swiper-bundle.js"></script>
  <script>
    var swiper = new Swiper('.swiper-container', {
      effect: 'coverflow',
      grabCursor: true,
      centeredSlides: true,
      slidesPerView: 'auto',
      coverflowEffect: {
        rotate: 20,
        stretch: 0,
        depth: 200,
        modifier: 1,
        slideShadows: true,
      },
      zoom: true,
      pagination: {
        el: '.swiper-pagination',
      },
      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },
      loop: true,
      autoplay: {
        delay: 2500,
        disableOnInteraction: false,
      }
    });
  </script>
</body>
</html>
